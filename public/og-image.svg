    <text x="68" y="92" font-family="Georgia, 'PT Serif', serif" font-weight="700" font-size="86" fill="#E11D26" stroke="#30C6E0" stroke-width="2.5">С</text>
    <g transform="translate(102,34)" fill="#E11D26" stroke="#30C6E0" stroke-width="2.5">
