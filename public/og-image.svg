    <text x="146" y="80" font-family="Manrope, Inter, system-ui" font-weight="800" font-size="58" fill="white" letter-spacing="1">АЛЛЕРГОСКРИН</text>
    <text x="148" y="115" font-family="Inter, system-ui" font-weight="500" font-size="22" fill="rgba(255,255,255,0.65)">медицинская лаборатория · с 2015</text>
